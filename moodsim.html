<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Global Mood AI FINAL</title>

<style>
body { background:#0f172a; color:white; font-family:Arial; padding:20px; }
.container { max-width:900px; margin:auto; }
.slider { margin-bottom:10px; }
input { width:100%; }

#result {
    margin-top:20px;
    padding:15px;
    border-radius:10px;
    font-size:22px;
    text-align:center;
}

canvas {
    background:#020617;
    margin-top:20px;
    border-radius:10px;
}

.box {
    margin-top:10px;
    padding:10px;
    background:#1e293b;
    border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 Global Mood AI FINAL</h1>

<button onclick="loadScenario('current')">Scenario attuale</button>
<button onclick="loadScenario('green')">Green</button>
<button onclick="loadScenario('crisis')">Crisi</button>

<hr>

<div class="slider">CO2 <span id="co2_val"></span>
<input id="co2" type="range" min="350" max="600"></div>

<div class="slider">Temperatura <span id="temp_val"></span>
<input id="temp" type="range" min="0.5" max="3" step="0.1"></div>

<div class="slider">Conflitti <span id="conflict_val"></span>
<input id="conflict" type="range" min="0" max="100"></div>

<button onclick="simulate()">Simula 20 anni</button>

<div id="result"></div>

<div class="box" id="analysis"></div>

<div class="box">
<b>Legenda:</b><br>
<span style="color:lime;">■ Mood</span> |
<span style="color:red;">■ Clima</span> |
<span style="color:orange;">■ Conflitti</span>
</div>

<canvas id="chart" width="800" height="300"></canvas>

</div>

<script>

// ===== MODEL =====
let model = null;

// ===== LOAD MODEL =====
async function loadModel(){
    let res = await fetch("model.json");
    model = await res.json();
}

// ===== ACTIVATION =====
function relu(x){ return Math.max(0,x); }

// ===== NN =====
function runModel(input){

    let [w1,b1,w2,b2] = model;

    function layer(x,w,b,act=true){
        let out=[];
        for(let i=0;i<w.length;i++){
            let sum=b[i];
            for(let j=0;j<x.length;j++){
                sum += x[j]*w[i][j];
            }
            out.push(act ? relu(sum) : sum);
        }
        return out;
    }

    let l1 = layer(input,w1,b1);
    let out = layer(l1,w2,b2,false);

    return out[0];
}

// ===== UPDATE UI =====
function updateUI(){

    if(!model) return;

    let co2 = +co2_el.value;
    let temp = +temp_el.value;
    let conflict = +conflict_el.value;

    let mood = runModel([co2,temp,conflict]);
    mood = Math.max(0, Math.min(100, mood));

    let color = "green";
    if(mood < 40) color = "red";
    else if(mood < 70) color = "orange";

    result.style.background = color;
    result.innerText = "Mood AI: " + mood.toFixed(1);

    updateLabels();
}

// ===== LABELS =====
function updateLabels(){
    co2_val.innerText = co2_el.value;
    temp_val.innerText = temp_el.value;
    conflict_val.innerText = conflict_el.value;
}

// ===== SIMULATION =====
let history = { mood:[], climate:[], conflict:[] };

function simulate(){

    let co2 = +co2_el.value;
    let temp = +temp_el.value;
    let conflict = +conflict_el.value;

    history = { mood:[], climate:[], conflict:[] };

    for(let i=0;i<20;i++){

        co2 += 5;
        temp += 0.05;
        conflict += 1;

        let mood = runModel([co2,temp,conflict]);
        mood = Math.max(0, Math.min(100, mood));

        let climate = temp * 40;

        history.mood.push(mood);
        history.climate.push(climate);
        history.conflict.push(conflict);
    }

    drawChart();
    analyze();
}

// ===== CHART =====
function drawChart(){

    let ctx = chart.getContext("2d");
    ctx.clearRect(0,0,800,300);

    function draw(data,scale,color){
        ctx.beginPath();
        ctx.moveTo(0,300-data[0]*scale);

        for(let i=1;i<data.length;i++){
            ctx.lineTo(i*40,300-data[i]*scale);
        }

        ctx.strokeStyle=color;
        ctx.stroke();
    }

    draw(history.mood,3,"lime");
    draw(history.climate,1,"red");
    draw(history.conflict,2,"orange");

    ctx.fillStyle="lime"; ctx.fillText("Mood",10,20);
    ctx.fillStyle="red"; ctx.fillText("Clima",10,40);
    ctx.fillStyle="orange"; ctx.fillText("Conflitti",10,60);
}

// ===== ANALYSIS =====
function analyze(){

    let txt = "<b>Analisi:</b><br>";

    if(history.mood[19] < history.mood[0])
        txt += "🔻 Peggioramento globale<br>";
    else
        txt += "🟢 Miglioramento<br>";

    if(history.climate[19] > 80)
        txt += "🔥 Stress climatico alto<br>";

    if(history.conflict[19] > 70)
        txt += "⚔️ Conflitti elevati<br>";

    analysis.innerHTML = txt;
}

// ===== SCENARI =====
function loadScenario(type){

    if(type==="current"){
        co2_el.value=420;
        temp_el.value=1.2;
        conflict_el.value=40;
    }

    if(type==="green"){
        co2_el.value=380;
        temp_el.value=1.0;
        conflict_el.value=20;
    }

    if(type==="crisis"){
        co2_el.value=500;
        temp_el.value=2.2;
        conflict_el.value=70;
    }

    updateUI();
}

// ===== INIT =====
let co2_el,temp_el,conflict_el;

window.onload = async () => {

    co2_el = document.getElementById("co2");
    temp_el = document.getElementById("temp");
    conflict_el = document.getElementById("conflict");

    await loadModel();

    document.querySelectorAll("input").forEach(el=>{
        el.addEventListener("input", updateUI);
    });

    loadScenario("current");
};

</script>

</body>
</html>
